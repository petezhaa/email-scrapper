name: Build desktop apps

# Run manually from the GitHub "Actions" tab, or on a version tag like v1.0.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-desktop.txt

      # The API credential is injected from repo Secrets, never committed.
      # Set ANTHROPIC_API_KEY (and optionally ANTHROPIC_BASE_URL /
      # ANTHROPIC_AUTH_TOKEN) under Settings → Secrets → Actions.
      - name: Write .env from secrets
        shell: bash
        run: |
          {
            echo "ANTHROPIC_BASE_URL=${{ secrets.ANTHROPIC_BASE_URL }}"
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
            echo "ANTHROPIC_AUTH_TOKEN=${{ secrets.ANTHROPIC_AUTH_TOKEN }}"
            echo "GMAIL_ADDRESS="
            echo "GMAIL_APP_PASSWORD="
          } > .env

      - name: Build
        run: python build_exe.py

      # A .app is a folder bundle; zip it (preserving exec bits) so the
      # downloaded artifact actually runs.
      - name: Package macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/ResearchOutreach.app dist/ResearchOutreach-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ResearchOutreach-${{ runner.os }}
          if-no-files-found: ignore
          path: |
            dist/ResearchOutreach.exe
            dist/ResearchOutreach-macos.zip
