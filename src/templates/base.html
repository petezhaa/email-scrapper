<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Outreach — {{ active|capitalize }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="{{ active }}">
  <header>
    <h1>Research Outreach</h1>
    <nav>
      <a href="{{ url_for('setup') }}" class="{{ 'on' if active=='setup' }}">1 · Setup</a>
      <a href="{{ url_for('contacts') }}" class="{{ 'on' if active=='contacts' }}">2 · Contacts</a>
      <a href="{{ url_for('drafts') }}" class="{{ 'on' if active=='drafts' }}">3 · Drafts</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Persistent, non-blocking status bar (scrape/draft/send run in the
       background; you can navigate and review while they work). -->
  <div id="jobbar" class="hidden">
    <span id="jobbar-spin" class="spin"></span>
    <span id="jobbar-msg"></span>
    <span id="jobbar-actions"></span>
    <button id="jobbar-dismiss" type="button" title="Hide">×</button>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
