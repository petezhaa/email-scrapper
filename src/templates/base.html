<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Research Outreach — {{ active|capitalize }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="{{ active }}">
  <header>
    <a class="brand" href="{{ url_for('setup') }}">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
             stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2.75" y="4.75" width="18.5" height="14.5" rx="1.5"></rect>
          <path d="M3.5 6 12 12.5 20.5 6"></path>
        </svg>
      </span>
      <span class="brand-name">Research&nbsp;Outreach</span>
    </a>
    <nav>
      <a href="{{ url_for('setup') }}" class="{{ 'on' if active=='setup' }}">
        <span class="step-num">01</span>Setup</a>
      <a href="{{ url_for('contacts') }}" class="{{ 'on' if active=='contacts' }}">
        <span class="step-num">02</span>Contacts</a>
      <a href="{{ url_for('drafts') }}" class="{{ 'on' if active=='drafts' }}">
        <span class="step-num">03</span>Drafts</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Persistent, non-blocking status bar (scrape/draft/send run in the
       background; you can navigate and review while they work). -->
  <div id="jobbar" class="hidden">
    <span id="jobbar-spin" class="spin"></span>
    <span id="jobbar-msg"></span>
    <span id="jobbar-actions"></span>
    <button id="jobbar-dismiss" type="button" title="Hide">&times;</button>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
